<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Определяем фрагмент с именем "sidebar" -->
<div th:fragment="sidebar" class="col-md-3 col-lg-2 d-none d-md-block sidebar p-0">
    <div class="d-flex flex-column min-vh-100 position-sticky pt-3">
        <div class="text-center mb-4">
            <h4 class="text-white">Магазин техники</h4>
        </div>
        <ul class="nav flex-column px-3 flex-grow-1">
            <li class="nav-item" th:each="item : ${menuItems}">
                <a th:href="@{${item.url}}"
                   class="nav-link d-flex align-items-center"
                   th:classappend="${item.isActive} ? 'active'">
                    <i th:class="'bi ' + ${item.icon}" class="me-2"></i>
                    <span th:text="${item.name}"></span>
                </a>
            </li>
        </ul>
        <!-- Кнопка выхода -->
        <div class="px-3 pb-3">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-link nav-link d-flex align-items-center w-100 text-start"
                        style="color: #adb5bd; text-decoration: none;">
                    <i class="bi bi-box-arrow-right me-2"></i>
                    <span>Выйти</span>
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
