<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="category-node(category, level)">
    <th:block th:with="collapseId='collapse-' + ${category.id}">
        <!-- Основной элемент категории с уровнями отступа и оформлением -->
        <div class="category-item" th:classappend="${'level-' + level}">
            <div class="d-flex align-items-center py-2 px-3">

                <!-- Кликабельная область для категорий с дочерними элементами -->
                <th:block th:if="${not #lists.isEmpty(category.childCategories)}">
                    <div class="category-clickable d-flex align-items-center flex-grow-1"
                         data-bs-toggle="collapse"
                         th:attr="data-bs-target='#'+${collapseId}"
                         aria-expanded="false"
                         role="button">
                        <span class="category-toggle flex-shrink-0" style="pointer-events: none;">
                            <i class="bi bi-chevron-right category-icon"></i>
                        </span>
                        <a th:href="@{/categories/{id}(id=${category.id})}"
                           class="text-decoration-none fw-semibold ms-2"
                           onclick="event.stopPropagation();">
                            <span th:text="${category.name}"></span>
                        </a>
                    </div>
                </th:block>

                <!-- Некликабельная область, если дочерних нет -->
                <th:block th:unless="${not #lists.isEmpty(category.childCategories)}">
                    <div class="d-flex align-items-center flex-grow-1">
                        <span class="flex-shrink-0" style="width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center; margin-right:12px;"></span>
                        <a th:href="@{/categories/{id}(id=${category.id})}"
                           class="text-decoration-none fw-semibold">
                            <span th:text="${category.name}"></span>
                        </a>
                    </div>
                </th:block>

                <!-- Бейдж с количеством товаров -->
                <div class="flex-shrink-0" style="min-width: 100px; text-align: right; margin-left: 8px;">
                    <span class="badge bg-secondary rounded-pill"
                          th:text="${category.productCount} + ' товаров'">0 товаров</span>
                </div>

                <!-- Кнопки действий (появляются при наведении) -->
                <div class="category-actions ms-2 flex-shrink-0">
                    <a th:href="@{/categories/{id}/edit(id=${category.id})}"
                       class="btn btn-sm btn-outline-success me-1" title="Редактировать">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button"
                            class="btn btn-sm btn-outline-danger"
                            data-bs-toggle="modal"
                            th:attr="data-bs-target='#deleteModal-' + ${category.id}"
                            title="Удалить">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Вложенные категории -->
        <div th:if="${not #lists.isEmpty(category.childCategories)}"
             class="collapse" th:id="${collapseId}">
            <div th:each="child : ${category.childCategories}">
                <div th:replace="~{fragments/category-node :: category-node(category=${child}, level=${level + 1})}"></div>
            </div>
        </div>

        <!-- Модальное окно удаления -->
        <div class="modal fade" th:id="'deleteModal-' + ${category.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Подтверждение удаления</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>Вы действительно хотите удалить категорию <strong th:text="${category.name}"></strong>?</p>
                        <div class="alert alert-warning mt-3">
                            <i class="bi bi-exclamation-triangle"></i>
                            Все товары в этой категории и подкатегориях останутся, но будут откреплены.
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <form th:action="@{/categories/{id}(id=${category.id})}" method="post">
                            <input type="hidden" name="_method" value="delete">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Удалить
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
