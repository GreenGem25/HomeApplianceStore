<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - Магазин техники">Магазин техники</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Общие стили (боковая панель, навигация и пр.) -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <!-- Дополнительные стили конкретной страницы (будут вставлены здесь) -->
    <th:block layout:fragment="styles"></th:block>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Боковая панель (подключаем фрагмент) -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Основной контент страницы -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4" layout:fragment="content">
            <!-- Здесь будет уникальное содержимое -->
        </main>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Скрипты страницы (будут добавлены сюда) -->
<th:block layout:fragment="scripts"></th:block>

<!-- Общая анимация бокового меню -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateX(5px)';
            });
            link.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
    });
</script>
</body>
</html>
