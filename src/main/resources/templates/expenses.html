<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Расходы</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pb-2 mb-3 border-bottom">
        <h1 class="h2"><i class="bi bi-cash-coin"></i> Расходы</h1>
        <a th:href="@{/expenses/add}" class="btn btn-success"><i class="bi bi-plus-circle"></i> Добавить расход</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/expenses}" method="get" class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="form-label">Дата с</label>
            <input type="date" class="form-control" name="from" th:value="${from}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Дата по</label>
            <input type="date" class="form-control" name="to" th:value="${to}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Тип</label>
            <select class="form-select" name="type">
                <option value="">Все</option>
                <option th:each="t : ${types}" th:value="${t.name()}" th:text="${t}" th:selected="${type != null and type == t}"></option>
            </select>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button type="submit" class="btn btn-primary me-2">Применить фильтр</button>
            <a th:href="@{/expenses}" class="btn btn-outline-secondary">Сбросить фильтры</a>
        </div>
    </form>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Дата</th>
            <th>Тип</th>
            <th>Описание</th>
            <th>Сумма</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="exp : ${expenses}">
            <td th:text="${#temporals.format(exp.expenseDate, 'dd.MM.yyyy')}"></td>
            <td th:text="${exp.type}"></td>
            <td th:text="${exp.description}"></td>
            <td th:text="${#numbers.formatDecimal(exp.amount, 1, 2, 'COMMA')}"></td>
            <td>
                <a th:href="@{/expenses/{id}/edit(id=${exp.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                <form th:action="@{/expenses/{id}/delete(id=${exp.id})}" method="post" class="d-inline" onsubmit="return confirm('Удалить?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <div th:if="${expenses.empty}" class="text-center text-muted py-3">Нет расходов</div>
</div>
</body>
</html>
