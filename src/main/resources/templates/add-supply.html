<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Создание поставки</title>
    <!-- flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/light.css">
    <style layout:fragment="styles">
        .form-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .product-item {
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
        }
        .total-summary {
            background-color: #e9ecef;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
        }
        .date-input-group {
            position: relative;
        }
        .date-input-group i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-truck"></i> Добавить поставку
        </h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/supplies}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-x-circle"></i> Отмена
            </a>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Форма добавления поставки -->
    <div class="card form-container">
        <div class="card-body">
            <form th:action="@{/supplies/add}" method="post" id="supplyForm" th:object="${supply}">

                <!-- Основная информация -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="supplierId" class="form-label">Поставщик *</label>
                        <select class="form-select" id="supplierId" th:field="*{supplierId}" required>
                            <option value="">-- Выберите поставщика --</option>
                            <option th:each="supplier : ${suppliers}"
                                    th:value="${supplier.id}"
                                    th:text="${supplier.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('supplierId')}"
                             th:errors="*{supplierId}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="supplyDate" class="form-label">Дата поставки</label>
                        <div class="date-input-group">
                            <input type="text" class="form-control" id="supplyDate"
                                   th:field="*{supplyDate}" placeholder="Выберите дату и время">
                            <i class="bi bi-calendar3"></i>
                        </div>
                        <small class="text-muted">Оставьте пустым для текущей даты</small>
                    </div>
                </div>

                <!-- Примечания -->
                <div class="mb-4">
                    <label for="notes" class="form-label">Примечания</label>
                    <textarea class="form-control" id="notes" th:field="*{notes}" rows="2"
                              placeholder="Дополнительная информация о поставке"></textarea>
                </div>

                <div class="mb-3">
                    <label for="logisticCost" class="form-label">Стоимость логистики (₽)</label>
                    <input type="number" step="0.01" class="form-control" id="logisticCost"
                           th:field="*{logisticCost}" placeholder="0.00">
                </div>

                <!-- Товары в поставке -->
                <h5 class="border-bottom pb-2 mt-4">
                    <i class="bi bi-box-seam"></i> Товары в поставке
                </h5>

                <div id="itemsContainer">
                    <!-- Существующие товары (отображаются при ошибках валидации) -->
                    <th:block th:each="item, iterStat : ${supply.items}">
                        <div class="product-item">
                            <div class="row align-items-end">
                                <div class="col-md-5">
                                    <label class="form-label">Товар *</label>
                                    <select class="form-select product-select"
                                            th:field="*{items[__${iterStat.index}__].productId}" required>
                                        <option value="">-- Выберите товар --</option>
                                        <th:block th:each="product : ${products}">
                                            <option th:value="${product.id}"
                                                    th:text="${product.name} + ' (' + (${product.manufacturer} ?: 'Бренд не указан') + ')'"
                                                    th:data-price="${product.price}"
                                                    th:data-stock="${product.stockQuantity}"></option>
                                        </th:block>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Количество *</label>
                                    <input type="number" class="form-control quantity-input"
                                           th:field="*{items[__${iterStat.index}__].quantity}"
                                           min="1" step="1" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Цена за ед. *</label>
                                    <input type="number" class="form-control price-input"
                                           th:field="*{items[__${iterStat.index}__].pricePerUnit}"
                                           min="0" step="0.01" required>
                                </div>
                                <div class="col-md-1">
                                    <button type="button" class="btn btn-danger remove-item-btn">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="row mt-2">
                                <div class="col-md-12">
                                    <small class="text-muted">
                                        Доступно на складе: <span class="stock-value">0</span> шт. |
                                        Сумма: <span class="row-total-display">0.00</span> ₽
                                    </small>
                                </div>
                            </div>
                        </div>
                    </th:block>
                </div>

                <button type="button" id="addItemBtn" class="btn btn-outline-primary mt-3">
                    <i class="bi bi-plus-circle"></i> Добавить товар
                </button>

                <!-- Итоговая информация -->
                <div class="total-summary">
                    <div class="row">
                        <div class="col-md-6">
                            <p class="mb-1"><strong>Всего позиций:</strong> <span id="totalItems">0</span></p>
                            <p class="mb-1"><strong>Всего единиц товара:</strong> <span id="totalQuantity">0</span> шт.</p>
                        </div>
                        <div class="col-md-6 text-end">
                            <p class="mb-1"><strong>Общая стоимость:</strong></p>
                            <h4 class="text-success" id="totalValue">₽0.00</h4>
                        </div>
                    </div>
                </div>

                <!-- Кнопки отправки -->
                <div class="d-flex justify-content-end mt-4">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-save"></i> Сохранить поставку
                    </button>
                    <a th:href="@{/supplies}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

    <script th:inline="javascript">
        const allProducts = /*[[${products}]]*/ [];
        console.log('Товары загружены:', allProducts);

        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#supplyDate", {
                enableTime: true,
                dateFormat: "Y-m-dTH:i",
                time_24hr: true,
                locale: "ru"
            });

            const itemsContainer = document.getElementById('itemsContainer');
            const addRowBtn = document.getElementById('addItemBtn');

            // Пересчёт суммы конкретной строки (не изменяет цену)
            function updateRowDisplay(row) {
                const qty = parseFloat(row.querySelector('.quantity-input')?.value) || 0;
                const price = parseFloat(row.querySelector('.price-input')?.value) || 0;
                const rowDisplay = row.querySelector('.row-total-display');
                if (rowDisplay) rowDisplay.textContent = (qty * price).toFixed(2);
                // Обновление остатка, если есть
                const select = row.querySelector('.product-select');
                const stockSpan = row.querySelector('.stock-value');
                if (stockSpan && select && select.selectedIndex > 0) {
                    const option = select.options[select.selectedIndex];
                    if (option.dataset.stock !== undefined) {
                        stockSpan.textContent = option.dataset.stock;
                    }
                }
            }

            function calculateTotals() {
                let totalSum = 0;
                let totalQty = 0;
                const rows = itemsContainer.querySelectorAll('.product-item');

                rows.forEach(row => updateRowDisplay(row));

                rows.forEach(row => {
                    const qty = parseFloat(row.querySelector('.quantity-input')?.value) || 0;
                    const price = parseFloat(row.querySelector('.price-input')?.value) || 0;
                    totalSum += qty * price;
                    totalQty += qty;
                });

                document.getElementById('totalValue').textContent =
                    '₽' + totalSum.toLocaleString('ru-RU', { minimumFractionDigits: 2 });
                document.getElementById('totalItems').textContent = rows.length;
                document.getElementById('totalQuantity').textContent = totalQty;
            }

            function createRow() {
                if (!allProducts || allProducts.length === 0) {
                    alert('Ошибка: список товаров не загружен');
                    return;
                }
                const index = itemsContainer.querySelectorAll('.product-item').length;
                const row = document.createElement('div');
                row.className = 'product-item';
                row.innerHTML = `
                <div class="row align-items-end">
                    <div class="col-md-5">
                        <label class="form-label">Товар *</label>
                        <select class="form-select product-select" name="items[${index}].productId" required>
                            <option value="">-- Выберите товар --</option>
                            ${allProducts.map(p => `
                                <option value="${p.id}" data-price="${p.price || 0}" data-stock="${p.stockQuantity || 0}">
                                    ${p.name} (${p.manufacturer || 'Бренд не указан'})
                                </option>`).join('')}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Количество *</label>
                        <input type="number" class="form-control quantity-input" name="items[${index}].quantity"
                               min="1" value="1" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Цена за ед. *</label>
                        <input type="number" class="form-control price-input" name="items[${index}].pricePerUnit"
                               min="0" step="0.01" required>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-danger remove-item-btn"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-12">
                        <small class="text-muted">
                            Доступно на складе: <span class="stock-value">0</span> шт. |
                            Сумма: <span class="row-total-display">0.00</span> ₽
                        </small>
                    </div>
                </div>
            `;
                itemsContainer.appendChild(row);
                calculateTotals();
            }

            function reindexItems() {
                itemsContainer.querySelectorAll('.product-item').forEach((row, i) => {
                    row.querySelector('.product-select').name = `items[${i}].productId`;
                    row.querySelector('.quantity-input').name = `items[${i}].quantity`;
                    row.querySelector('.price-input').name = `items[${i}].pricePerUnit`;
                });
            }

            addRowBtn.addEventListener('click', createRow);

            itemsContainer.addEventListener('click', (e) => {
                if (e.target.closest('.remove-item-btn')) {
                    const row = e.target.closest('.product-item');
                    const allRows = itemsContainer.querySelectorAll('.product-item');
                    if (allRows.length <= 1) {
                        const select = row.querySelector('.product-select');
                        const qty = row.querySelector('.quantity-input');
                        const price = row.querySelector('.price-input');
                        if (select) select.selectedIndex = 0;
                        if (qty) qty.value = 1;
                        if (price) price.value = '';
                        const stock = row.querySelector('.stock-value');
                        if (stock) stock.textContent = '0';
                    } else {
                        row.remove();
                        reindexItems();
                    }
                    calculateTotals();
                }
            });

            // При смене товара подставляем цену и остаток
            itemsContainer.addEventListener('input', (e) => {
                if (e.target.classList.contains('product-select')) {
                    const option = e.target.options[e.target.selectedIndex];
                    const row = e.target.closest('.product-item');
                    if (option && option.dataset.price) {
                        row.querySelector('.price-input').value = option.dataset.price;
                    }
                    if (option && option.dataset.stock !== undefined) {
                        row.querySelector('.stock-value').textContent = option.dataset.stock;
                    }
                }
                // Пересчитываем итоги при любом изменении
                calculateTotals();
            });

            // Инициализация существующих строк при загрузке
            const existingRows = itemsContainer.querySelectorAll('.product-item');
            if (existingRows.length === 0) {
                createRow();
            } else {
                // Для каждой строки: если цена не задана, подставляем из выбранного товара
                existingRows.forEach(row => {
                    const select = row.querySelector('.product-select');
                    const priceInput = row.querySelector('.price-input');
                    const stockSpan = row.querySelector('.stock-value');
                    if (select && select.selectedIndex > 0) {
                        const option = select.options[select.selectedIndex];
                        if (priceInput && (!priceInput.value || priceInput.value === '0')) {
                            priceInput.value = option.dataset.price || '';
                        }
                        if (stockSpan && option.dataset.stock !== undefined) {
                            stockSpan.textContent = option.dataset.stock;
                        }
                    }
                });
                calculateTotals();
            }
        });
    </script>
</th:block>
</body>
</html>
