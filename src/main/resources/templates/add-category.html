<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Добавление категории</title>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-tags"></i> Добавить категорию
        </h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/categories}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-x-circle"></i> Отмена
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Форма добавления категории -->
    <form th:action="@{/categories/add}" method="post" th:object="${category}">
        <div class="card mb-4">
            <div class="card-body">
                <!-- Основные поля -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Название категории</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="parentCategoryId" class="form-label">Родительская категория</label>
                        <select class="form-select" id="parentCategoryId" th:field="*{parentCategoryId}">
                            <option value="">-- Без родительской категории --</option>
                            <option th:each="category : ${allCategories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"></option>
                        </select>
                    </div>
                </div>

                <!-- Описание -->
                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" th:field="*{description}" rows="3"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}"></div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary me-2">
                <i class="bi bi-save"></i> Сохранить
            </button>
            <a th:href="@{/categories}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle"></i> Отмена
            </a>
        </div>
    </form>
</div>

</body>
</html>
