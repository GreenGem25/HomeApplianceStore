<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Товары</title>
    <style layout:fragment="styles">
        .product-image {
            max-height: 400px;
            object-fit: contain;
            background-color: #f8f9fa;
        }
        .product-details-card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .back-link {
            transition: all 0.2s;
        }
        .back-link:hover {
            transform: translateX(-3px);
        }
    </style>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-box-seam"></i>
            <span th:text="${product.name}"></span>
        </h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/products}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
        </div>
    </div>

    <!-- Карточка товара -->
    <div class="card product-details-card mb-4">
        <div class="row g-0">
            <div class="col-md-5">
                <img th:src="${product.imagePath != null} ? ${product.imagePath} : '/images/no-image.png'"
                     class="img-fluid rounded-start product-image p-4"
                     alt="Изображение товара"
                     onerror="this.src='/images/no-image.png'">
            </div>
            <div class="col-md-7">
                <div class="card-body">
                    <h2 class="card-title" th:text="${product.name}"></h2>
                    <div class="d-flex align-items-center mb-3">
                        <span class="badge bg-success me-2" th:text="${product.stockQuantity} + ' в наличии'"></span>
                        <span class="badge bg-info" th:text="${product.warrantyPeriod} + ' мес. гарантии'"></span>
                    </div>

                    <h3 class="text-primary mb-4" th:text="${'Розничная цена ₽' + #numbers.formatDecimal(product.price, 1, 2, 'COMMA')}"></h3>
                    <h3 class="text-primary mb-4" th:text="${'Себестоимость ₽' + #numbers.formatDecimal(product.costPrice, 1, 2, 'COMMA')}"></h3>

                    <div class="mb-4">
                        <h5 class="border-bottom pb-2">Описание</h5>
                        <p class="card-text" th:text="${product.description} ?: 'Описание отсутствует'"></p>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <h5 class="border-bottom pb-2">Производитель</h5>
                            <p th:text="${product.manufacturer} ?: 'Не указан'"></p>
                        </div>
                        <div class="col-md-6">
                            <h5 class="border-bottom pb-2">Категория</h5>
                            <a th:if="${product.categoryId != null}"
                               th:href="@{/categories/{id}(id=${product.categoryId})}"
                               th:text="${product.categoryName} ?: 'Не указана'"></a>
                            <span th:if="${product.categoryId == null}">Не указана</span>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <h5 class="border-bottom pb-2">Поставщик</h5>
                            <a th:if="${product.supplierId != null}"
                               th:href="@{/suppliers/{id}(id=${product.supplierId})}"
                               th:text="${product.supplierName} ?: 'Не указан'"></a>
                            <span th:if="${product.supplierId == null}">Не указан</span>
                        </div>
                        <div class="col-md-6">
                            <h5 class="border-bottom pb-2">Продано</h5>
                            <p th:text="${product.totalSold} + ' шт.'"></p>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/products}" class="btn btn-outline-secondary back-link">
                            <i class="bi bi-arrow-left"></i> К списку товаров
                        </a>
                        <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">
                            <i class="bi bi-trash"></i> Удалить
                        </button>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-primary">
                            <i class="bi bi-pencil"></i> Редактировать
                        </a>
                    </div>

                    <!-- Модальное окно подтверждения удаления -->
                    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="deleteModalLabel">Подтверждение удаления</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    Вы уверены, что хотите удалить товар "<span th:text="${product.name}"></span>"?
                                    <div class="alert alert-warning mt-3">
                                        <i class="bi bi-exclamation-triangle"></i> Это действие нельзя отменить!
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                                    <form th:action="@{/products/{id}(id=${product.id})}" method="post">
                                        <input type="hidden" name="_method" value="delete">
                                        <button type="submit" class="btn btn-danger">
                                            <i class="bi bi-trash"></i> Удалить
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
