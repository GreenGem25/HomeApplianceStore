<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Добавить расход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/light.css">
</head>
<body>
<div layout:fragment="content">
    <h2><i class="bi bi-plus-circle"></i> Добавить расход</h2>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <form th:action="@{/expenses/{id}/edit(id=${expense.id})}" method="post" th:object="${expense}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label class="form-label">Сумма *</label>
            <input type="number" step="0.01" class="form-control" th:field="*{amount}" th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{amount}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Дата *</label>
            <input type="text" th:field="*{expenseDate}" id="expenseDate" class="form-control" required>
            <div class="invalid-feedback" th:errors="*{expenseDate}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Тип *</label>
            <select class="form-select" th:field="*{type}" th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                <option value="">-- выберите --</option>
                <option th:each="t : ${types}" th:value="${t.name()}" th:text="${t}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{type}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/expenses}" class="btn btn-outline-secondary">Отмена</a>
    </form>
</div>

<th:block layout:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#expenseDate", {
                dateFormat: "Y-m-d",
                locale: "ru"
            });
        });
    </script>
</th:block>

</body>
</html>
