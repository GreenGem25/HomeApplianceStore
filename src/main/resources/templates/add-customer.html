<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Добавление клиента</title>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-person-plus"></i> Добавить нового клиента
        </h1>
        <a th:href="@{/customers}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад к списку
        </a>
    </div>

    <!-- Уведомления -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Форма с привязкой к объекту customer -->
    <form th:action="@{/customers/add}" th:object="${customer}" method="post" enctype="multipart/form-data" novalidate>
        <div class="row g-3">
            <!-- Основная информация -->
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        Основная информация
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">Имя*</label>
                            <input type="text" class="form-control" id="firstName"
                                   th:field="*{firstName}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                                 th:errors="*{firstName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Фамилия*</label>
                            <input type="text" class="form-control" id="lastName"
                                   th:field="*{lastName}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                                 th:errors="*{lastName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Дополнительная информация -->
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        Дополнительная информация
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="phone" class="form-label">Телефон</label>
                            <input type="tel" class="form-control" id="phone"
                                   th:field="*{phone}" th:errorclass="is-invalid"
                                   placeholder="+7 (XXX) XXX-XX-XX">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                                 th:errors="*{phone}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Адрес</label>
                            <textarea class="form-control" id="address"
                                      th:field="*{address}" rows="3"
                                      th:errorclass="is-invalid"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}"
                                 th:errors="*{address}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="imageFile" class="form-label">Фото клиента</label>
                            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                            <small class="text-muted">Максимальный размер: 5MB</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button type="reset" class="btn btn-secondary">Очистить</button>
            <button type="submit" class="btn btn-primary">Добавить клиента</button>
        </div>
    </form>
</div>

<th:block layout:fragment="scripts">
    <!-- Inputmask для автоматического форматирования телефона -->
    <script src="https://cdn.jsdelivr.net/npm/inputmask@5.0.8/dist/inputmask.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Маска для телефона в формате +7 (XXX) XXX-XX-XX
            Inputmask({
                mask: '+7 (999) 999-99-99',
                placeholder: '_',
                showMaskOnHover: false,
                clearIncomplete: true
            }).mask(document.getElementById('phone'));
        });
    </script>
</th:block>
</body>
</html>
