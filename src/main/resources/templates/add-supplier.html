<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Товары</title>
    <style layout:fragment="styles">
        .supplier-icon {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            border-radius: 50%;
            font-size: 2.5rem;
            color: #6c757d;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-building"></i> Добавить нового поставщика
        </h1>
        <a th:href="@{/suppliers}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад к списку
        </a>
    </div>

    <!-- Уведомления -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/suppliers/add}" method="post" class="needs-validation" novalidate>
        <div class="row g-3">
            <!-- Основная информация -->
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        Основная информация
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <div class="supplier-icon">
                                <i class="bi bi-building"></i>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">Название компании*</label>
                            <input type="text" class="form-control" id="name"
                                   name="name" required>
                            <div class="invalid-feedback">Пожалуйста, укажите название компании</div>
                        </div>

                        <div class="mb-3">
                            <label for="contactName" class="form-label">Контактное лицо</label>
                            <input type="text" class="form-control" id="contactName"
                                   name="contactName">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Контактная информация -->
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        Контактная информация
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="phone" class="form-label">Телефон</label>
                            <input type="tel" class="form-control" id="phone" name="phone"
                                   pattern="[\+]\d{1}\s[\(]\d{3}[\)]\s\d{3}[\-]\d{2}[\-]\d{2}"
                                   placeholder="+7 (XXX) XXX-XX-XX">
                            <div class="invalid-feedback">Пожалуйста, укажите телефон в формате +7 (XXX) XXX-XX-XX</div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email"
                                   name="email">
                            <div class="invalid-feedback">Пожалуйста, укажите корректный email</div>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Адрес</label>
                            <textarea class="form-control" id="address"
                                      name="address" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button type="reset" class="btn btn-secondary">Очистить</button>
            <button type="submit" class="btn btn-primary">Добавить поставщика</button>
        </div>
    </form>
</div>

<!-- Скрипты для страницы товаров (если нужны специфичные) -->
<th:block layout:fragment="scripts">
    <script>
        // Валидация формы
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</th:block>
</body>
</html>
