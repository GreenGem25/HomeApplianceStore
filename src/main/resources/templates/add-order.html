<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>Создание заказа</title>
  <style layout:fragment="styles">
    .product-item {
      border: 1px solid #dee2e6;
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #f8f9fa;
      transition: all 0.2s ease-in-out;
    }
    .product-item:hover {
      border-color: #b6d4fe;
      box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    }
  </style>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">
      <i class="bi bi-cart-plus"></i> Создать новый заказ
    </h1>
    <div class="btn-toolbar mb-2 mb-md-0">
      <a th:href="@{/orders}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Назад
      </a>
    </div>
  </div>

  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <form th:action="@{/orders/add}" method="post" id="orderForm">
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <div class="row mb-4">
          <div class="col-md-6">
            <label for="customerId" class="form-label fw-bold">Клиент *</label>
            <select class="form-select" id="customerId" name="customerId" required>
              <option value="">-- Выберите клиента --</option>
              <option th:each="customer : ${customers}"
                      th:value="${customer.id}"
                      th:text="${customer.firstName + ' ' + customer.lastName}"></option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="shippingAddress" class="form-label fw-bold">Адрес доставки *</label>
            <input type="text" class="form-control" id="shippingAddress" name="shippingAddress" required>
          </div>
        </div>

        <h5 class="border-bottom pb-2 mt-4 text-primary">Товары в заказе</h5>
        <div id="itemsContainer">
          <div class="product-item">
            <div class="row">
              <div class="col-md-6">
                <label class="form-label text-muted small mb-1">Товар *</label>
                <select class="form-select product-select" name="items[0].productId" required>
                  <option value="">-- Выберите товар --</option>
                  <option th:each="product : ${products}"
                          th:value="${product.id}"
                          th:text="${product.name + ' (₽' + #numbers.formatDecimal(product.price, 1, 2, 'COMMA') + ')'}"
                          th:attr="data-price=${product.price},data-stock=${product.stockQuantity}"></option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label text-muted small mb-1">Количество *</label>
                <input type="number" class="form-control quantity-input"
                       name="items[0].quantity" min="1" value="1" required>
                <small class="text-secondary stock-info d-block mt-1"></small>
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button type="button" class="btn btn-outline-danger w-100 remove-item-btn" title="Удалить позицию">
                  <i class="bi bi-trash"></i> Удалить
                </button>
              </div>
            </div>
          </div>
        </div>

        <button type="button" id="addItemBtn" class="btn btn-outline-primary mt-2">
          <i class="bi bi-plus-circle"></i> Добавить еще товар
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <a th:href="@{/orders}" class="btn btn-light border">
        Отмена
      </a>
      <button type="submit" class="btn btn-primary px-4">
        <i class="bi bi-check2-circle"></i> Сохранить заказ
      </button>
    </div>
  </form>
</div>

<!-- Скрипты для страницы товаров -->
<th:block layout:fragment="scripts">
  <script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {

      // Получаем массив товаров напрямую
      const productsData = /*[[${products}]]*/ [];
      const container = document.getElementById('itemsContainer');

      // Предварительно собираем HTML для выпадающего списка товаров
      const optionsHtml = productsData.map(product =>
              `<option value="${product.id}" data-price="${product.price}" data-stock="${product.stockQuantity}">
        ${product.name} (₽${product.price.toFixed(2)})
      </option>`
      ).join('');

      // Добавление товара
      document.getElementById('addItemBtn').addEventListener('click', function() {
        const newItem = document.createElement('div');
        newItem.className = 'product-item';

        // Используем шаблонную строку
        newItem.innerHTML = `
        <div class="row">
          <div class="col-md-6">
            <label class="form-label text-muted small mb-1">Товар *</label>
            <select class="form-select product-select" required>
              <option value="">-- Выберите товар --</option>
              ${optionsHtml}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small mb-1">Количество *</label>
            <input type="number" class="form-control quantity-input" min="1" value="1" required>
            <small class="text-secondary stock-info d-block mt-1"></small>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button type="button" class="btn btn-outline-danger w-100 remove-item-btn" title="Удалить позицию">
              <i class="bi bi-trash"></i> Удалить
            </button>
          </div>
        </div>
      `;

        container.appendChild(newItem);
        reindexItems();
      });

      // Обработка изменений в селектах и инпутах
      container.addEventListener('change', function(e) {

        // Если изменили выбор товара
        if (e.target.classList.contains('product-select')) {
          const select = e.target;
          const item = select.closest('.product-item');
          const quantityInput = item.querySelector('.quantity-input');
          const stockInfo = item.querySelector('.stock-info');
          const selectedOption = select.options[select.selectedIndex];

          if (selectedOption && selectedOption.value) {
            const stock = parseInt(selectedOption.dataset.stock);
            stockInfo.textContent = `В наличии: ${stock} шт.`;
            quantityInput.max = stock;

            // Если текущее введенное значение больше доступного остатка
            if (parseInt(quantityInput.value) > stock) {
              quantityInput.value = stock;
            }
          } else {
            stockInfo.textContent = '';
            quantityInput.removeAttribute('max');
          }
        }

        // Если изменили количество
        if (e.target.classList.contains('quantity-input')) {
          const input = e.target;
          const max = parseInt(input.max);
          const value = parseInt(input.value);

          if (!isNaN(max) && !isNaN(value) && value > max) {
            input.value = max;
            alert(`Максимально доступное количество для этого товара: ${max} шт.`);
          }
        }
      });

      // Обработка кликов (Удаление строки)
      container.addEventListener('click', function(e) {
        const removeBtn = e.target.closest('.remove-item-btn');
        if (removeBtn) {
          const items = document.querySelectorAll('.product-item');
          if (items.length > 1) {
            removeBtn.closest('.product-item').remove();
            reindexItems();
          } else {
            alert('В заказе должен оставаться хотя бы один товар.');
          }
        }
      });

      // Пересчет индексов для Spring (items[0], items[1]...)
      function reindexItems() {
        document.querySelectorAll('.product-item').forEach((item, index) => {
          item.querySelector('.product-select').name = `items[${index}].productId`;
          item.querySelector('.quantity-input').name = `items[${index}].quantity`;
        });
      }

      // Валидация формы перед отправкой
      document.getElementById('orderForm').addEventListener('submit', function(e) {
        const items = document.querySelectorAll('.product-item');
        let isValid = true;

        items.forEach(item => {
          const select = item.querySelector('.product-select');
          if (!select.value) {
            alert('Пожалуйста, выберите товар для всех добавленных позиций.');
            isValid = false;
          }
        });

        if (!isValid) e.preventDefault();
      });

    });
    /*]]>*/
  </script>
</th:block>
</body>
</html>
