<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            position: fixed;
            width: 250px;
            min-height: 100vh;
            background: #212529;
            transition: all 0.3s;
        }
        .nav-link {
            color: #adb5bd;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .nav-link:hover, .nav-link.active {
            color: white;
            background: #0d6efd;
        }
        .nav-link i {
            width: 24px;
            text-align: center;
        }
        .supply-card {
            transition: all 0.2s;
        }
        .supply-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .status-badge {
            font-size: 0.9rem;
            padding: 0.35em 0.65em;
        }
        .status-pending {
            background-color: #ffc107;
            color: #000;
        }
        .status-completed {
            background-color: #198754;
            color: #fff;
        }
        .status-cancelled {
            background-color: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Боковое меню -->
        <div class="col-md-3 col-lg-2 d-none d-md-block sidebar p-0">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <h4 class="text-white">Магазин техники</h4>
                </div>
                <ul class="nav flex-column px-3">
                    <li class="nav-item" th:each="item : ${menuItems}">
                        <a th:href="@{${item.url}}"
                           class="nav-link d-flex align-items-center"
                           th:classappend="${item.isActive} ? 'active'">
                            <i th:class="'bi ' + ${item.icon}" class="me-2"></i>
                            <span th:text="${item.name}"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Основной контент -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">
                    <i class="bi bi-truck"></i> Список поставок
                </h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a th:href="@{/supplies/add}" class="btn btn-success">
                        <i class="bi bi-plus-circle"></i> Добавить поставку
                    </a>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Фильтры -->
            <div class="card mb-4">
                <div class="card-body">
                    <form class="row g-3" th:action="@{/supplies}" method="get">
                        <div class="col-md-4">
                            <input type="text" class="form-control" name="search" placeholder="Поиск по номеру поставки">
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" name="status">
                                <option value="">Все статусы</option>
                                <option value="PENDING">Ожидание</option>
                                <option value="COMPLETED">Завершена</option>
                                <option value="CANCELLED">Отменена</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-search"></i> Поиск
                            </button>
                            <a th:href="@{/supplies}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle"></i> Сброс
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Список поставок -->
            <div class="list-group">
                <div th:each="supply : ${supplies}" class="list-group-item list-group-item-action supply-card mb-2">
                    <div class="d-flex w-100 justify-content-between">
                        <div>
                            <h5 class="mb-1">
                                Поставка #<span th:text="${supply.supplyNumber}"></span>
                                <span class="badge status-badge"
                                      th:classappend="${supply.status == 'PENDING'} ? 'status-pending' :
                                                     (${supply.status == 'COMPLETED'} ? 'status-completed' : 'status-cancelled')"
                                      th:text="${supply.statusDisplayName}"></span>
                            </h5>
                            <p class="mb-1">
                                <i class="bi bi-building"></i>
                                <a th:href="@{/suppliers/{id}(id=${supply.supplierId})}"
                                   th:text="${supply.supplierName}"></a>
                            </p>
                            <small class="text-muted">
                                <i class="bi bi-calendar"></i>
                                <span th:text="${#temporals.format(supply.supplyDate, 'dd.MM.yyyy HH:mm')}"></span>
                                <span class="ms-3">
                                    <i class="bi bi-box"></i>
                                    <span th:text="${supply.totalItems} + ' товаров, ' + ${supply.totalQuantity} + ' шт.'"></span>
                                </span>
                            </small>
                        </div>
                        <div class="text-end">
                            <h5 th:text="${'₽' + #numbers.formatDecimal(supply.totalValue, 1, 2, 'COMMA')}"></h5>
                            <a th:href="@{/supplies/{id}(id=${supply.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> Подробнее
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Сообщение, если нет поставок -->
            <div th:if="${supplies.empty}" class="text-center py-5">
                <i class="bi bi-truck" style="font-size: 3rem; color: #6c757d;"></i>
                <h5 class="card-title mt-3">Поставки не найдены</h5>
                <p class="card-text">Создайте первую поставку</p>
                <a th:href="@{/supplies/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Создать поставку
                </a>
            </div>
        </main>
    </div>
</div>

<script>
    // Анимация бокового меню
    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateX(5px)';
            });

            link.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
