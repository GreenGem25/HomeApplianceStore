<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказ #<span th:text="${order.orderNumber}"></span> – Печатная форма</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
        }
        .print-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        @media print {
            body {
                background: white;
            }
            .print-container {
                box-shadow: none;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .text-muted {
                color: #6c757d !important;
            }
            .table {
                border-collapse: collapse;
            }
        }
    </style>
</head>
<body>

<div class="print-container">
    <!-- Шапка с динамическими реквизитами магазина -->
    <div class="text-center mb-4">
        <h3 th:text="${settings.shopName}"></h3>
        <p class="text-muted">
            <span th:text="${settings.address}"></span><br>
            Тел.: <span th:text="${settings.phone}"></span>
        </p>
        <small th:text="${settings.email}"></small>
        <hr>
    </div>

    <!-- Основная информация о заказе -->
    <div class="row mb-3">
        <div class="col-6">
            <h5>Заказ #<span th:text="${order.orderNumber}"></span></h5>
            <p class="mb-0"><strong>Дата:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></span></p>
            <p><strong>Статус:</strong> <span th:text="${order.statusDisplayName}"></span></p>
        </div>
        <div class="col-6 text-end">
            <h5>Клиент</h5>
            <p class="mb-0"><strong th:text="${order.customerName}"></strong></p>
            <p class="text-muted" th:text="${order.shippingAddress}"></p>
        </div>
    </div>

    <!-- Таблица товаров -->
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>№</th>
            <th>Товар</th>
            <th>Цена</th>
            <th>Кол-во</th>
            <th>Ставка НДС</th>
            <th>Сумма НДС</th>
            <th>Сумма</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item, iter : ${order.items}">
            <td th:text="${iter.count}">1</td>
            <td th:text="${item.productName}"></td>
            <td th:text="'₽' + ${#numbers.formatDecimal(item.price, 1, 2, 'COMMA')}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.vatRate != null ? item.vatRate + '%' : '—'}"></td>
            <td th:text="${item.vatRate != null ? '₽' + #numbers.formatDecimal(item.vatAmount, 1, 2, 'COMMA') : '—'}"></td>
            <td th:text="'₽' + ${#numbers.formatDecimal(item.totalPrice, 1, 2, 'COMMA')}"></td>
        </tr>
        </tbody>
    </table>

    <!-- Итого -->
    <div class="row">
        <div class="col-6"></div>
        <div class="col-6">
            <table class="table">
                <tr>
                    <td><strong>Скидка клиента:</strong></td>
                    <td class="text-end" th:text="${order.customerDiscount} + '%'">0%</td>
                </tr>
                <tr>
                    <td><strong>в том числе НДС:</strong></td>
                    <td class="text-end" th:text="'₽' + ${#numbers.formatDecimal(order.totalVatAmount, 1, 2, 'COMMA')}">0.00</td>
                </tr>
                <tr>
                    <td><strong>Итоговая сумма:</strong></td>
                    <td class="text-end h5"><strong th:text="'₽' + ${#numbers.formatDecimal(order.finalPrice, 1, 2, 'COMMA')}"></strong></td>
                </tr>
            </table>
        </div>
    </div>

    <!-- Кнопки для экрана -->
    <div class="mt-4 no-print text-end">
        <button class="btn btn-primary" onclick="window.print()">
            <i class="bi bi-printer"></i> Печать
        </button>
        <button class="btn btn-secondary" onclick="window.close()">Закрыть</button>
    </div>
</div>

</body>
</html>
