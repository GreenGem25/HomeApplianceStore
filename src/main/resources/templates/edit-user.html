<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Редактирование пользователя</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .sidebar {
      position: fixed;
      width: 250px;
      min-height: 100vh;
      background: #212529;
    }
    .nav-link {
      color: #adb5bd;
      border-radius: 5px;
      margin-bottom: 5px;
    }
    .nav-link:hover, .nav-link.active {
      color: white;
      background: #0d6efd;
    }
    .nav-link i {
      width: 24px; text-align: center;
    }
    .form-container {
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Меню -->
    <div class="col-md-3 col-lg-2 d-none d-md-block sidebar p-0">
      <div class="position-sticky pt-3">
        <div class="text-center mb-4">
          <h4 class="text-white">Магазин техники</h4>
        </div>
        <ul class="nav flex-column px-3">
          <li class="nav-item" th:each="item : ${menuItems}">
            <a th:href="@{${item.url}}"
               class="nav-link d-flex align-items-center"
               th:classappend="${item.isActive} ? 'active'">
              <i th:class="'bi ' + ${item.icon}" class="me-2"></i>
              <span th:text="${item.name}"></span>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
          <i class="bi bi-pencil"></i> Редактировать пользователя
        </h1>
        <a th:href="@{/users}" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-x-circle"></i> Отмена
        </a>
      </div>

      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <div class="card form-container">
        <div class="card-body">
          <form th:action="@{/users/{id}/edit(id=${user.id})}" method="post" th:object="${user}">
            <input type="hidden" th:field="*{id}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
              <label class="form-label">Логин</label>
              <input type="text" class="form-control" disabled
                     th:value="${username ?: ''}">
              <small class="text-muted">Логин изменить нельзя</small>
            </div>

            <div class="mb-3">
              <label for="fullName" class="form-label">Полное имя</label>
              <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                     th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
              <label for="role" class="form-label">Роль</label>
              <select class="form-select" id="role" th:field="*{role}"
                      th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                <option value="">-- Выберите роль --</option>
                <option value="ADMIN">Администратор</option>
                <option value="MANAGER">Менеджер</option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Новый пароль</label>
              <input type="password" class="form-control" id="password" th:field="*{password}"
                     th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
              <small class="text-muted">Оставьте пустым, если не хотите менять пароль</small>
            </div>

            <div class="d-flex justify-content-end">
              <button type="submit" class="btn btn-primary me-2">
                <i class="bi bi-save"></i> Сохранить
              </button>
              <a th:href="@{/users}" class="btn btn-outline-secondary">Отмена</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
      link.addEventListener('mouseenter', () => link.style.transform = 'translateX(5px)');
      link.addEventListener('mouseleave', () => link.style.transform = '');
    });
  });
</script>
</body>
</html>
