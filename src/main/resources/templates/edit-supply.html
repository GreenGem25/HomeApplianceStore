<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Редактирование поставки</title>
    <!-- flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/light.css">
    <style layout:fragment="styles">
        .content { margin-left: 250px; padding: 20px; background: #f8f9fa; min-height: 100vh; }
        .product-item { border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: white; }
        .total-card { background: #e9ecef; border-radius: 8px; padding: 20px; position: sticky; top: 20px; }
    </style>
</head>
<body>

<!-- Основной контент -->
<div layout:fragment="content">
    <div class="container-fluid">
        <form th:action="@{/supplies/{id}(id=${supplyId})}" th:method="post" th:object="${supply}" id="supplyForm">
            <input type="hidden" name="_method" value="PUT" />

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-0">Редактирование поставки <span th:text="${supplyNumber}" class="text-muted small"></span></h2>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/supplies/{id}(id=${supplyId})}" class="btn btn-outline-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Дата поставки</label>
                                    <input type="text" th:field="*{supplyDate}" id="supplyDate" class="form-control" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Заметки</label>
                                    <textarea th:field="*{notes}" class="form-control" rows="2"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                            <h5 class="mb-0">Список товаров</h5>
                            <button type="button" class="btn btn-success btn-sm" id="addItemBtn">
                                <i class="bi bi-plus-lg"></i> Добавить строку
                            </button>
                        </div>
                        <div class="card-body">
                            <div id="itemsContainer">
                                <!-- Существующие строки редактируемой поставки -->
                                <th:block th:each="item, stat : *{items}">
                                    <div class="product-item">
                                        <div class="row align-items-end g-3">
                                            <div class="col-md-5">
                                                <label class="form-label small text-muted">Товар</label>
                                                <select th:field="*{items[__${stat.index}__].productId}" class="form-select product-select" required>
                                                    <option value="">-- Выберите товар --</option>
                                                    <option th:each="p : ${products}"
                                                            th:value="${p.id}"
                                                            th:text="${p.name}"
                                                            th:data-price="${p.price}"></option>
                                                </select>
                                            </div>
                                            <div class="col-md-3">
                                                <label class="form-label small text-muted">Кол-во</label>
                                                <input type="number" th:field="*{items[__${stat.index}__].quantity}" class="form-control quantity-input" min="1" required>
                                            </div>
                                            <div class="col-md-3">
                                                <label class="form-label small text-muted">Цена за ед.</label>
                                                <input type="number" th:field="*{items[__${stat.index}__].pricePerUnit}" class="form-control price-input" step="0.01" min="0" required>
                                            </div>
                                            <div class="col-md-1">
                                                <button type="button" class="btn btn-outline-danger remove-item-btn"><i class="bi bi-trash"></i></button>
                                            </div>
                                        </div>
                                        <div class="mt-2 text-end">
                                            <small class="text-muted">Позиция на сумму: <span class="row-total-display">0.00</span> ₽</small>
                                        </div>
                                    </div>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="total-card shadow-sm">
                        <h5>Итого</h5>
                        <div class="d-flex justify-content-between mb-2"><span>Позиций:</span><strong id="totalItems">0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>Товаров:</span><strong id="totalQuantity">0</strong></div>
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="h5">Сумма:</span>
                            <span class="h4 text-primary" id="totalValue">0.00 ₽</span>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

    <script th:inline="javascript">
        const allProducts = /*[[${products}]]*/ [];
        console.log('Товары загружены:', allProducts);

        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#supplyDate", {
                enableTime: true,
                dateFormat: "Y-m-dTH:i",
                time_24hr: true,
                locale: "ru"
            });

            const itemsContainer = document.getElementById('itemsContainer');
            const addItemBtn = document.getElementById('addItemBtn');

            function updateRowDisplay(row) {
                const qty = parseFloat(row.querySelector('.quantity-input')?.value) || 0;
                const price = parseFloat(row.querySelector('.price-input')?.value) || 0;
                const rowDisplay = row.querySelector('.row-total-display');
                if (rowDisplay) rowDisplay.textContent = (qty * price).toFixed(2);
            }

            function calculateTotals() {
                let totalSum = 0;
                let totalQty = 0;
                const rows = itemsContainer.querySelectorAll('.product-item');

                rows.forEach(row => updateRowDisplay(row));

                rows.forEach(row => {
                    const qty = parseFloat(row.querySelector('.quantity-input')?.value) || 0;
                    const price = parseFloat(row.querySelector('.price-input')?.value) || 0;
                    totalSum += qty * price;
                    totalQty += qty;
                });

                document.getElementById('totalValue').textContent =
                    totalSum.toLocaleString('ru-RU', { minimumFractionDigits: 2 }) + ' ₽';
                document.getElementById('totalItems').textContent = rows.length;
                document.getElementById('totalQuantity').textContent = totalQty;
            }

            function createRow() {
                if (!allProducts || allProducts.length === 0) {
                    alert('Ошибка: список товаров не загружен');
                    return;
                }
                const index = itemsContainer.querySelectorAll('.product-item').length;
                const row = document.createElement('div');
                row.className = 'product-item';
                row.innerHTML = `
                <div class="row align-items-end g-3">
                    <div class="col-md-5">
                        <select class="form-select product-select" name="items[${index}].productId" required>
                            <option value="">-- Выберите товар --</option>
                            ${allProducts.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" class="form-control quantity-input" name="items[${index}].quantity" min="1" value="1" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" class="form-control price-input" name="items[${index}].pricePerUnit" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-outline-danger remove-item-btn"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
                <div class="mt-2 text-end">
                    <small class="text-muted">Позиция на сумму: <span class="row-total-display">0.00</span> ₽</small>
                </div>
            `;
                itemsContainer.appendChild(row);
                calculateTotals();
            }

            function reindexItems() {
                itemsContainer.querySelectorAll('.product-item').forEach((row, i) => {
                    row.querySelector('.product-select').name = `items[${i}].productId`;
                    row.querySelector('.quantity-input').name = `items[${i}].quantity`;
                    row.querySelector('.price-input').name = `items[${i}].pricePerUnit`;
                });
            }

            addItemBtn.addEventListener('click', createRow);

            itemsContainer.addEventListener('click', (e) => {
                if (e.target.closest('.remove-item-btn')) {
                    const row = e.target.closest('.product-item');
                    const allRows = itemsContainer.querySelectorAll('.product-item');
                    if (allRows.length <= 1) {
                        const select = row.querySelector('.product-select');
                        const qty = row.querySelector('.quantity-input');
                        const price = row.querySelector('.price-input');
                        if (select) select.selectedIndex = 0;
                        if (qty) qty.value = 1;
                        if (price) price.value = '';
                    } else {
                        row.remove();
                        reindexItems();
                    }
                    calculateTotals();
                }
            });

            // Только при смене товара проставляем цену
            itemsContainer.addEventListener('input', (e) => {
                if (e.target.classList.contains('product-select')) {
                    const option = e.target.options[e.target.selectedIndex];
                    const row = e.target.closest('.product-item');
                    if (option && option.dataset.price) {
                        row.querySelector('.price-input').value = option.dataset.price;
                    }
                }
                calculateTotals();
            });

            // Инициализация при загрузке
            const rows = itemsContainer.querySelectorAll('.product-item');
            if (rows.length === 0) {
                createRow();
            } else {
                rows.forEach(row => {
                    const select = row.querySelector('.product-select');
                    const priceInput = row.querySelector('.price-input');
                    if (select && select.selectedIndex > 0) {
                        const option = select.options[select.selectedIndex];
                        // Подставляем цену только если она не задана
                        if (priceInput && (!priceInput.value || priceInput.value === '0')) {
                            priceInput.value = option.dataset.price || '';
                        }
                    }
                });
                calculateTotals();
            }
        });
    </script>
</th:block>
</body>
</html>
