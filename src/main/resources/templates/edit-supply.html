<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать поставку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .sidebar { position: fixed; width: 250px; min-height: 100vh; background: #212529; }
        .content { margin-left: 250px; padding: 20px; background: #f8f9fa; min-height: 100vh; }
        .product-item { border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: white; }
        .total-card { background: #e9ecef; border-radius: 8px; padding: 20px; position: sticky; top: 20px; }
    </style>
</head>
<body>

<!-- Боковое меню -->
<div class="col-md-3 col-lg-2 d-none d-md-block sidebar p-0">
    <div class="position-sticky pt-3">
        <div class="text-center mb-4">
            <h4 class="text-white">Магазин техники</h4>
        </div>
        <ul class="nav flex-column px-3">
            <li class="nav-item" th:each="item : ${menuItems}">
                <a th:href="@{${item.url}}"
                   class="nav-link d-flex align-items-center"
                   th:classappend="${item.isActive} ? 'active'">
                    <i th:class="'bi ' + ${item.icon}" class="me-2"></i>
                    <span th:text="${item.name}"></span>
                </a>
            </li>
        </ul>
    </div>
</div>

<div class="content">
    <div class="container-fluid">
        <form th:action="@{/supplies/{id}(id=${id})}" th:method="post" th:object="${supply}" id="supplyForm">
            <input type="hidden" name="_method" value="PUT" />

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-0">Редактирование поставки <span th:text="${supplyNumber}" class="text-muted small"></span></h2>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/supplies/{id}(id=${id})}" class="btn btn-outline-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Дата поставки</label>
                                    <input type="text" th:field="*{supplyDate}" id="supplyDate" class="form-control" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Заметки</label>
                                    <textarea th:field="*{notes}" class="form-control" rows="2"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                            <h5 class="mb-0">Список товаров</h5>
                            <button type="button" class="btn btn-success btn-sm" id="addItemBtn">
                                <i class="bi bi-plus-lg"></i> Добавить строку
                            </button>
                        </div>
                        <div class="card-body">
                            <div id="itemsContainer">
                                <div th:each="item, stat : *{items}" class="product-item">
                                    <div class="row align-items-end g-3">
                                        <div class="col-md-5">
                                            <label class="form-label small text-muted">Товар</label>
                                            <select th:field="*{items[__${stat.index}__].productId}" class="form-select product-select" required>
                                                <option value="">-- Выберите товар --</option>
                                                <option th:each="p : ${products}"
                                                        th:value="${p.id}"
                                                        th:text="${p.name}"
                                                        th:data-price="${p.price}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label small text-muted">Кол-во</label>
                                            <input type="number" th:field="*{items[__${stat.index}__].quantity}" class="form-control quantity-input" min="1" required>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label small text-muted">Цена за ед.</label>
                                            <input type="number" th:field="*{items[__${stat.index}__].pricePerUnit}" class="form-control price-input" step="0.01" min="0" required>
                                        </div>
                                        <div class="col-md-1">
                                            <button type="button" class="btn btn-outline-danger remove-item-btn"><i class="bi bi-trash"></i></button>
                                        </div>
                                    </div>
                                    <div class="mt-2 text-end">
                                        <small class="text-muted">Позиция на сумму: <span class="row-total-display">0.00</span> ₽</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="total-card shadow-sm">
                        <h5>Итого</h5>
                        <div class="d-flex justify-content-between mb-2"><span>Позиций:</span><strong id="totalItems">0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>Товаров:</span><strong id="totalQuantity">0</strong></div>
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="h5">Сумма:</span>
                            <span class="h4 text-primary" id="totalValue">0.00 ₽</span>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<script th:inline="javascript">
    (function() {
        // Загружаем список продуктов из модели для новых строк
        const allProducts = [[${products}]] || [];
        const itemsContainer = document.getElementById('itemsContainer');
        const addItemBtn = document.getElementById('addItemBtn');

        // Flatpickr инициализация
        flatpickr("#supplyDate", {
            enableTime: true,
            dateFormat: "Y-m-dTH:i",
            time_24hr: true,
            locale: "ru"
        });

        // Расчет итогов (с учетом уже существующих данных в HTML)
        function calculateTotals() {
            let totalSum = 0;
            let totalQty = 0;
            const rows = itemsContainer.querySelectorAll('.product-item');

            rows.forEach(row => {
                const q = parseFloat(row.querySelector('.quantity-input').value) || 0;
                const p = parseFloat(row.querySelector('.price-input').value) || 0;
                const sum = q * p;

                row.querySelector('.row-total-display').textContent = sum.toFixed(2);
                totalSum += sum;
                totalQty += q;
            });

            document.getElementById('totalValue').textContent = totalSum.toLocaleString('ru-RU', { minimumFractionDigits: 2 }) + ' ₽';
            document.getElementById('totalItems').textContent = rows.length;
            document.getElementById('totalQuantity').textContent = totalQty;
        }

        // Функция добавления НОВОЙ строки (использует индекс на основе текущего кол-ва строк)
        function createRow() {
            const index = itemsContainer.querySelectorAll('.product-item').length;
            const row = document.createElement('div');
            row.className = 'product-item';

            row.innerHTML = `
                <div class="row align-items-end g-3">
                    <div class="col-md-5">
                        <select name="items[${index}].productId" class="form-select product-select" required>
                            <option value="">-- Выберите товар --</option>
                            ${allProducts.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="items[${index}].quantity" class="form-control quantity-input" min="1" value="1" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="items[${index}].pricePerUnit" class="form-control price-input" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-outline-danger remove-item-btn"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
                <div class="mt-2 text-end">
                    <small class="text-muted">Позиция на сумму: <span class="row-total-display">0.00</span> ₽</small>
                </div>
            `;
            itemsContainer.appendChild(row);
            calculateTotals();
        }

        // Переиндексация (нужна ТОЛЬКО при удалении строки)
        function reindexItems() {
            itemsContainer.querySelectorAll('.product-item').forEach((row, i) => {
                row.querySelector('.product-select').name = `items[${i}].productId`;
                row.querySelector('.quantity-input').name = `items[${i}].quantity`;
                row.querySelector('.price-input').name = `items[${i}].pricePerUnit`;
            });
        }

        // Слушатели событий
        addItemBtn.addEventListener('click', createRow);

        itemsContainer.addEventListener('click', (e) => {
            if (e.target.closest('.remove-item-btn')) {
                e.target.closest('.product-item').remove();
                reindexItems();
                calculateTotals();
            }
        });

        itemsContainer.addEventListener('input', (e) => {
            if (e.target.classList.contains('product-select')) {
                const opt = e.target.options[e.target.selectedIndex];
                const row = e.target.closest('.product-item');
                // Подставляем цену только если она еще не установлена или товар изменился
                if (opt && opt.dataset.price) {
                    row.querySelector('.price-input').value = opt.dataset.price;
                }
            }
            calculateTotals();
        });

        // КРИТИЧЕСКИЙ МОМЕНТ: Инициализация при открытии страницы
        // Если Thymeleaf отрисовал строки, просто считаем итоги.
        // Не вызываем createRow(), чтобы не добавлять пустую строку поверх существующих.
        calculateTotals();

    })();
</script>

<script>
    // Анимация бокового меню
    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateX(5px)';
            });

            link.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
    });
</script>
</body>
</html>
