# Special configs for Docker

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# Development only
spring.liquibase.drop-first=true

# Resources
spring.web.resources.static-locations=classpath:/static/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# Connection pools
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA configs
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.com.servicecenter=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Debug logging
#logging.level.liquibase=DEBUG
#logging.level.liquibase.core=DEBUG
#logging.level.liquibase.integration.spring=DEBUG
#logging.level.liquibase.changelog=DEBUG
#logging.level.liquibase.resource=DEBUG
#logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG
#logging.level.org.springframework.boot.context.properties=DEBUG
#logging.level.org.springframework.jdbc=DEBUG

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=5
server.tomcat.max-connections=50
server.tomcat.accept-count=100